name = "idkaboutbytes/brio"
version = "1.1.0"
description = "Brio package for Roblox."
license = "MIT"
authors = ["idkaboutbytes"]
repository = "https://github.com/idkaboutbytes/brio"
includes = [
    "pesde.toml",
    "README.md",
    "CHANGELOG.md",
    "default.project.json",
    "src/**/*.luau",
]


[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[target]
environment = "roblox"
lib = "src/init.luau"
build_files = ["src"]

[dependencies]
Loader = { repo = "idkaboutbytes/loader", rev = "v1.2.1" }
Maid = { repo = "idkaboutbytes/maid", rev = "v1.1.0" }
Signal = { wally = "kineticwallet/lemon-signal", version = "^1.10.0" }
Table = { repo = "idkaboutbytes/table", rev = "v1.0.1" }
