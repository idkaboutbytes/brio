name = "idkaboutbytes/brio"
version = "1.0.0"
description = "Brio package for Roblox."
license = "MIT"
authors = ["idkaboutbytes"]
repository = "https://github.com/idkaboutbytes/brio"
includes = [
    "pesde.toml",
    "README.md",
    "CHANGELOG.md",
    "default.project.json",
    "src/**/*.luau",
]

[target]
environment = "roblox"
lib = "src/init.luau"
build_files = ["src"]

[dependencies]
Maid = { repo = "idkaboutbytes/maid", rev = "v1.1.0" }
Signal = { wally = "kineticwallet/lemon-signal", version = "^1.10.0" }
